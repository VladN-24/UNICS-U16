<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Чат с ИИ</title>
</head>
<body>

    <h1> Чат </h1>

    {% if answer %}
        <p>{{ answer }}</p>
        <hr>
        <a href="{{ url_for('chat') }}">Заново</a>
    {% else %}
        <p>{{ questions[cur] }}</p>
        
        <form method="post">
            <textarea name="question" rows="4" cols="40" required></textarea>
            <br>
            <button type="submit">отправить</button>
        </form>

        <p>Вопрос {{ cur + 1 }} из {{ questions|length }}</p>
    {% endif %}

    <p>
        <a href="{{ url_for('index') }}">Главная</a>
    </p>

</body>
</html>
