<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Чат с ИИ</title>
</head>
<body>

    <h1>Посчитай каллории</h1>

    {% if answer %}
        <p>{{ request.form.get('question', '') }}</p>
        <p> {{ answer }}</p>
        <hr>
    {% else %}
        <p>Введи блюдо</p>
    {% endif %}

    <form method="post">
        <textarea name="question" rows="4" cols="40" required></textarea>
        <br>
        <button type="submit">Отправить</button>
    </form>

    <p>
        <a href="{{ url_for('index') }}">Главная</a> |

    </p>

</body>
</html>
